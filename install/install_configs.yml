---
- name: Install configs
  hosts: [renderer, player]
  vars:
    repo_dir: /home/{{ ansible_facts["user_id"] }}/configs
  vars_files:
    - ../vars/program_versions.yml
    - ../vars/vault.yml
  tasks:
    - name: Install Config Dependencies
      ansible.builtin.apt:
        name:
          - meson
        state: present
      become: true

    - name: Clone Repo
      ansible.builtin.git:
        repo: https://github.com/tu-studio/seamless-configs.git
        dest: "{{ repo_dir }}"
        version: "{{ config_version }}"
        update: true

    - name: Remove Meson Build dir
      ansible.builtin.file:
        state: absent
        path: "{{ repo_dir }}/build"

    - name: Meson Setup
      ansible.builtin.command:
        cmd: meson setup build --buildtype release -Dversioned_install=true -Dlocation={{ location }} -Dnode={{ inventory_hostname }}
        chdir: "{{ repo_dir }}"

    - name: Meson Install
      ansible.builtin.command:
        cmd: meson install -C build
        chdir: "{{ repo_dir }}"
      become: true

    - name: Systemd daemon reload
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: Make sure systemd user dir exists
      ansible.builtin.file:
        path: /home/{{ ansible_user }}/.config/systemd
        state: directory
        owner: "{{ ansible_user }}"
        mode: 755
      become: true

    - name: Systemd enable jack service
      ansible.builtin.systemd:
        service: jack.service
        enabled: true
        scope: user
        masked: false
