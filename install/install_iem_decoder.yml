---
- name: Install IEM Decoder
  hosts: all
  vars:
    repo_dir: /home/{{ ansible_user_id }}/iem-plugin-suite
    service_name: ambisonics
    target_dir: /usr/local
  vars_files:
    - ../vars/vault.yml
    - ../vars/program_versions.yml

  tasks:
    - name: Only install IEM decoder on devices that are concerned
      ansible.builtin.meta: end_host
      when: not (services is defined) or (service_name not in services)
    - name: Install Dependencies
      ansible.builtin.apt:
        name:
          - libasound2-dev 
          - libjack-jackd2-dev
          - libfreetype6-dev
          - libx11-dev
          - libxcomposite-dev
          - libxcursor-dev
          - libxcursor-dev
          - libxext-dev
          - libxinerama-dev
          - libxrandr-dev
          - libxrender-dev
          - libglu1-mesa-dev
          - mesa-common-dev
        state: present
      become: true

    - name: Clone Repo
      ansible.builtin.git:
        repo: git@github.com:TU-Studio/IEMPluginSuite.git
        dest: "{{ repo_dir }}"
        version: "{{ iem_plugins_version }}"
        update: true
    - name: Version Number
      ansible.builtin.command:
        cmd: git describe --dirty --tags
        chdir:  "{{ repo_dir }}"
      register: version_number
      changed_when: false
      
    - name: Cmake configure build
      ansible.builtin.command:
        cmd: cmake -B build -DCMAKE_BUILD_TYPE=Release -DIEM_STANDALONE_HEADLESS=1
        chdir: "{{ repo_dir }}"

    - name: Cmake build
      ansible.builtin.command:
        cmd: cmake --build build --config Release
        chdir: "{{ repo_dir }}"

    - name: Move Artefacts
      ansible.builtin.copy:
        remote_src: true
        src: "{{ repo_dir }}/build/{{ item }}/{{ item }}_artefacts/Release/Standalone/{{ item }}"
        dest: /usr/local/bin/{{ item }}{{ version_number.stdout }}
        mode: preserve
      loop: ["AllRADecoder", "DistanceCompensator"]
      become: true

    - name: Link this version
      ansible.builtin.file:
        src: /usr/local/bin/{{ item }}{{ version_number.stdout }}
        dest: /usr/local/bin/{{ item }}
        state: link
      loop: ["AllRADecoder", "DistanceCompensator"]
      become: true

    - name: Systemd daemon reload
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user
    - name: Systemd enable service
      ansible.builtin.systemd:
        service: "{{ item }}.service"
        enabled: true
        scope: user
        masked: false
      loop: ["allra_decoder", "distance_compensator"]
