---
- name: Setup SSH key
  hosts: all
  vars:
    github_token: !vault |
              $ANSIBLE_VAULT;1.1;AES256
              39336263626164633638333438656333393139613166633533663234306365646231353863333435
              3734383262666130353934396430633935666262336336380a303935646637356535626136663636
              64393831306233353665353966633337323533383832613831636433346332323333386263393931
              3063613433363938660a316333336535346639366162313266633433396365373162376263656462
              38373663353962663536373832393837616539353661376562633838306433376537383762656135
              6538623635626464303332343334623161343464626638613865
  tasks:
    - name: Generate SSH key
      community.crypto.openssh_keypair:
        path: ~/.ssh/id_rsa
    - name: Read SSH public key to authorize
      ansible.builtin.shell: cat ~/.ssh/id_rsa.pub
      register: ssh_pub_key
    - debug:
        msg: "ssh_pub_key: {{ ssh_pub_key.stdout }}"
    - name: Authorize key with GitHub
      local_action:
        module: github_key
        name: "{{ inventory_hostname }}"
        token: "{{ github_token }}"
        pubkey: '{{ ssh_pub_key.stdout }}'