---
- name: Roll out new project
  hosts: hufo_video
  gather_facts: false
  vars:
    project_source: /home/leto/ak/hufo_videos/
  tasks:
    - name: Mount Data directory
      ansible.builtin.shell:
        cmd: cardmount rw

    - name: "Copy Metamorphosis onto the server"
      copy:
        src: "{{ project_source }}pune_metamorphosis/Pune_Metamorphosis_HF-0{{ inventory_hostname[-1] }}.mp4"
        dest: /mnt/data/
        owner: root
        group: root
        mode: "u=rwx,g=rx,o=rx"

    - name: "Copy Wasserwelten onto the server"
      copy:
        src: "{{ project_source }}/Wasserwelten/wasser_{{ inventory_hostname[-1] }}.mov"
        dest: /mnt/data/
        owner: root
        group: root
        mode: "u=rwx,g=rx,o=rx"

    - name: "Copy Sculputral Beatings onto the server"
      copy:
        src: "{{ project_source }}/sculptural_beatings/sculptur_{{ inventory_hostname[-1] }}.mov"
        dest: /mnt/data/
        owner: root
        group: root
        mode: "u=rwx,g=rx,o=rx"

    - name: "Copy playlist.txt"
      ansible.builtin.template:
        src: playlist.txt.j2
        dest: /mnt/data/playlist.txt
        owner: root
        group: root
        mode: "u=rwx,g=rx,o=rx"
      vars:
        video_id: "{{ inventory_hostname[-1] }}"
        video_id_reverse: "{{ 7 - (inventory_hostname[-1] | int) }}"

    - name: Reboot
      ansible.builtin.reboot:

